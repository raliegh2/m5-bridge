name: V14.3 five-symbol ICT ten-year backtest

on:
  pull_request:
    branches:
      - v14-3-weak-symbol-enhancement
    paths:
      - "mt5_ai_bridge/v14_3_all_symbol_ict.py"
      - "research/v14_3_five_symbol_ict_10y_backtest.py"
      - "tests/test_v14_3_all_symbol_ict.py"
      - ".github/workflows/v14-3-five-symbol-ict-10y.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_3_all_symbol_ict.py
          research/v14_3_five_symbol_ict_10y_backtest.py
          tests/test_v14_3_all_symbol_ict.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_v14_3_all_symbol_ict.py | tee five-symbol-ict-tests.log
      - name: Generate all-symbol ICT and run chronological replays
        run: |
          python research/v14_3_five_symbol_ict_10y_backtest.py \
            --v12-ledger research/v12_final_ledger_output/v12_final_trade_ledger.csv \
            --ict-source research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv \
            --out research/v14_3_five_symbol_ict_output \
            | tee five-symbol-ict-backtest.log
      - name: Verify validation, mode coverage, profit and drawdown
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('research/v14_3_five_symbol_ict_output/all_results.json').read_text())
          selection = payload['selection']
          results = payload['results']
          for symbol in ('EURUSD','AUDUSD','USDJPY'):
              report = selection[symbol]
              assert report['candidate_count'] > 0, (symbol, report)
              assert report['validation_passed'], (symbol, report['profiles'][report['selected']]['validation'])
          for result in results.values():
              enhanced = result['five_symbol_ict']
              current = result['current']
              assert enhanced['net_profit'] >= current['net_profit'], (result['case'], current['net_profit'], enhanced['net_profit'])
              assert enhanced['max_closed_drawdown_percent'] < 10.0
              assert enhanced['stress_drawdown_percent'] < 10.0
              for symbol, coverage in result['mode_coverage'].items():
                  assert coverage['v12_enabled'], (symbol, coverage)
                  assert coverage['ict_enabled'], (symbol, coverage)
          ten = results['exact_10_year_window']
          print('Current exact ten-year profit:', ten['current']['net_profit'])
          print('Five-symbol ICT exact ten-year profit:', ten['five_symbol_ict']['net_profit'])
          print('Five-symbol ICT exact ten-year PF:', ten['five_symbol_ict']['profit_factor'])
          print('Five-symbol ICT exact ten-year max DD:', ten['five_symbol_ict']['max_closed_drawdown_percent'])
          print('Five-symbol ICT exact ten-year stress DD:', ten['five_symbol_ict']['stress_drawdown_percent'])
          for symbol in ('EURUSD','AUDUSD','USDJPY'):
              report = selection[symbol]
              print(symbol, report['selected'], report['profiles'][report['selected']])
          PY
      - name: Upload complete backtest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-3-five-symbol-ict-10y
          path: |
            research/v14_3_five_symbol_ict_output/
            five-symbol-ict-tests.log
            five-symbol-ict-backtest.log
          if-no-files-found: error
          retention-days: 90
