name: V14.5.1 versus $34k live V14.3 backtest

on:
  pull_request:
    branches:
      - v14-4-live-profit-guard
    paths:
      - "mt5_ai_bridge/v14_5_cost_robust_profile.py"
      - "research/v14_5_1_vs_current_live_backtest.py"
      - "research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv"
      - "research/v12_final_ledger_output/v12_final_trade_ledger.csv"
      - ".github/workflows/v14-5-1-vs-current-live-backtest.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compare-models:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib
      - name: Compile comparison
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_5_cost_robust_profile.py
          research/v14_5_1_vs_current_live_backtest.py
      - name: Run corrected comparison backtest
        run: |
          mkdir -p research/v14_5_1_vs_current_live_output
          python research/v14_5_1_vs_current_live_backtest.py \
            | tee research/v14_5_1_vs_current_live_output/backtest_stdout.log
      - name: Validate benchmark and outputs
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          root = Path('research/v14_5_1_vs_current_live_output')
          payload = json.loads((root / 'comparison_results.json').read_text())
          assert payload['expected_live_exact_ten_year_net'] == 34690.840749742056
          promoted = payload['models']['v14_5_1']['promoted_v12_engines']
          assert promoted == [
              'EURUSD_SWING_CORE',
              'GBPJPY_SWING_CORE',
              'GBPUSD_V10_PRECISION',
          ], promoted
          assert 'AUDUSD_TREND_PULLBACK' not in promoted

          results = payload['results']
          live = results['exact_10_year/current_live_v14_3/zero_cost']['summary']
          assert abs(live['net_profit'] - 34690.840749742056) <= 0.02, live
          assert abs(live['ending_balance'] - 39690.840749742056) <= 0.02, live
          assert live['closed_trades'] == 4974, live

          required = [
              f'exact_10_year/{model}/{cost}'
              for model in ('current_live_v14_3', 'v14_5_1')
              for cost in ('zero_cost', 'demo_cost', 'retail_cost')
          ]
          assert all(key in results for key in required)
          for key in required:
              summary = results[key]['summary']
              assert summary['closed_trades'] > 0, (key, summary)
              assert summary['ending_balance'] > 0, (key, summary)

          rows = list(csv.DictReader((root / 'comparison_summary.csv').open()))
          assert len(rows) == 12, len(rows)
          yearly = list(csv.DictReader((root / 'yearly_profit_equity.csv').open()))
          assert yearly
          assert (root / 'BACKTEST_COMPARISON.md').exists()
          assert (root / 'exact_10_year_demo_profit.png').exists()
          assert (root / 'exact_10_year_demo_equity.png').exists()

          for cost in ('zero_cost', 'demo_cost', 'retail_cost'):
              current = results[f'exact_10_year/current_live_v14_3/{cost}']['summary']
              new = results[f'exact_10_year/v14_5_1/{cost}']['summary']
              print(cost, {
                  'live_net': current['net_profit'],
                  'v14_5_1_net': new['net_profit'],
                  'profit_delta': round(new['net_profit'] - current['net_profit'], 2),
                  'live_dd': current['max_closed_drawdown_percent'],
                  'v14_5_1_dd': new['max_closed_drawdown_percent'],
              })
          PY
      - name: Upload corrected comparison package
        uses: actions/upload-artifact@v4
        with:
          name: corrected-v14-5-1-vs-34k-live-v14-3
          path: research/v14_5_1_vs_current_live_output/
          if-no-files-found: error
          retention-days: 90
