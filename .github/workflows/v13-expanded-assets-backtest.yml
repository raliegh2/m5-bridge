name: V13 expanded asset backtest

on:
  pull_request:
    branches:
      - v12-hybrid-adaptive-swing
    paths:
      - "research/v13_expanded_assets_backtest.py"
      - "research/v13_expanded_assets_backtest_v2.py"
      - ".github/workflows/v13-expanded-assets-backtest.yml"
      - "mt5_ai_bridge/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pandas numpy
      - name: Run validation-gated synchronized replay
        run: python research/v13_expanded_assets_backtest_v2.py
      - name: Upload backtest outputs
        uses: actions/upload-artifact@v4
        with:
          name: v13-expanded-assets-backtest-v2
          path: research/v13_output_v2/
          if-no-files-found: error
