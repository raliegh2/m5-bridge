name: V14.6 five-symbol swing plus ICT retail target

on:
  pull_request:
    branches:
      - v14-5-4-selective-ict-alpha
    paths:
      - "research/v14_6_five_symbol_dual_engine_target.py"
      - "research/v14_6_five_symbol_dual_engine_committed_data.py"
      - "research/v12_final_ledger_output/v12_final_trade_ledger.csv"
      - "mt5_ai_bridge/v14_3_all_symbol_ict.py"
      - "research/v13_expanded_assets_backtest.py"
      - ".github/workflows/v14-6-five-symbol-dual-engine.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib
      - name: Compile research
        run: >-
          python -m py_compile
          research/v14_6_five_symbol_dual_engine_target.py
          research/v14_6_five_symbol_dual_engine_committed_data.py
      - name: Run five-symbol sleeve validation and portfolio search
        run: |
          set -o pipefail
          mkdir -p research/v14_6_five_symbol_dual_engine_output
          python research/v14_6_five_symbol_dual_engine_committed_data.py 2>&1 \
            | tee research/v14_6_five_symbol_dual_engine_output/backtest_stdout.log
      - name: Validate evidence, accounting and target classification
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('research/v14_6_five_symbol_dual_engine_output')
          payload = json.loads((root / 'v14_6_results.json').read_text())
          assert payload['target'] == {
              'starting_balance': 5000.0,
              'net_profit': 34000.0,
              'ending_balance': 39000.0,
              'after_retail_costs_and_fees': True,
          }
          assert payload['all_in_cost_r'] == {
              'SWING': 0.04,
              'ICT_WIDE': 0.09,
              'ICT_LEGACY_M1': 0.16,
          }
          assert set(payload['selections']) == {
              'GBPUSD', 'EURUSD', 'GBPJPY', 'AUDUSD', 'USDJPY'
          }
          for symbol, modes in payload['selections'].items():
              assert set(modes) == {'SWING', 'ICT'}
              for mode, selection in modes.items():
                  if selection is not None:
                      for segment in ('development', 'confirmation', 'holdout'):
                          evidence = selection['evidence']['segments'][segment]
                          assert evidence['trades'] > 0, (symbol, mode, segment, evidence)
                          assert evidence['net_r'] > 0, (symbol, mode, segment, evidence)
                          assert evidence['profit_factor'] > 1.0, (symbol, mode, segment, evidence)

          best = payload['best_safe_portfolio']
          assert best['ending_balance'] > 0
          assert best['max_closed_drawdown_percent'] <= 9.60 + 1e-9, best
          assert best['stress_drawdown_percent'] <= 10.00 + 1e-9, best
          assert payload['target_reached'] == (best['net_profit'] >= 34000.0)
          assert payload['target_gap'] == round(max(0.0, 34000.0 - best['net_profit']), 2)
          if payload['target_reached']:
              assert payload['coverage']['all_ten_sleeves_active'] is True

          for expected in (
              'BACKTEST_REPORT.md',
              'all_swing_candidates.csv',
              'all_wide_ict_candidates.csv',
              'best_safe_trades.csv',
              'best_safe_skipped.csv',
              'best_safe_governor_events.csv',
              'portfolio_risk_search.csv',
              'retail_profit_search.png',
              'retail_profit_vs_drawdown.png',
          ):
              assert (root / expected).exists(), expected

          print('coverage', payload['coverage'])
          print('best_safe', best)
          print('target_reached', payload['target_reached'])
          print('target_gap', payload['target_gap'])
          print('attribution', payload['attribution'])
          PY
      - name: Persist compact research results
        if: github.event_name == 'pull_request'
        run: |
          cp research/v14_6_five_symbol_dual_engine_output/BACKTEST_REPORT.md research/V14_6_FIVE_SYMBOL_RESULTS.md
          cp research/v14_6_five_symbol_dual_engine_output/v14_6_results.json research/v14_6_five_symbol_results.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/V14_6_FIVE_SYMBOL_RESULTS.md research/v14_6_five_symbol_results.json
          git commit -m "Record V14.6 five-symbol retail-target results" || exit 0
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload complete research package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-6-five-symbol-dual-engine
          path: research/v14_6_five_symbol_dual_engine_output/
          if-no-files-found: error
          retention-days: 90
