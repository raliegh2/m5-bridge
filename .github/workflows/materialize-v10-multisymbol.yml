name: Materialize V10 multi-symbol

on:
  push:
    branches:
      - v10-multisymbol-live-ready
    paths:
      - tools/materialize_v10_multisymbol_payload.py
      - .github/workflows/materialize-v10-multisymbol.yml

permissions:
  contents: write

jobs:
  materialize-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v10-multisymbol-live-ready
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Materialize implementation
        run: python tools/materialize_v10_multisymbol_payload.py
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pandas pytest
      - name: Compile
        run: python -m compileall -q mt5_ai_bridge research tools tests
      - name: Run V10 multi-symbol tests
        run: python -m pytest -q tests/test_v10_multisymbol.py tests/test_v10_multisymbol_backtest.py
      - name: Commit generated implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mt5_ai_bridge/v10_multisymbol.py \
                  research/v10_multisymbol_backtest.py \
                  research/V10_MULTISYMBOL_BACKTEST_REPORT.md \
                  research/v10_multisymbol_results.json \
                  tests/test_v10_multisymbol.py \
                  tests/test_v10_multisymbol_backtest.py \
                  tools/apply_strategy_engine_v10_multisymbol.py \
                  .env.strategy-engine-v10-multisymbol.example \
                  V10_MULTISYMBOL_LIVE_CANDIDATE.md
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "feat: materialize V10 multi-symbol live candidate [skip ci]"
            git push origin HEAD:v10-multisymbol-live-ready
          fi
