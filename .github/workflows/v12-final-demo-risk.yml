name: V12 final supervised controls

on:
  pull_request:
    branches:
      - v12-weak-engine-optimization
    paths:
      - "mt5_ai_bridge/v12_final_risk.py"
      - "mt5_ai_bridge/v12_final_state.py"
      - "mt5_ai_bridge/v12_final_execution.py"
      - "mt5_ai_bridge/v12_final_adapter.py"
      - "tests/test_v12_final_risk.py"
      - "tests/test_v12_final_execution.py"
      - "tests/test_v12_final_adapter.py"
      - "tests/test_v12_runner_timezones.py"
      - "v12_final_preflight.py"
      - "v12_final_runner.py"
      - "research/v12_final_runner_parity_backtest.py"
      - ".env.v12-final-demo.example"
      - "V12_FINAL_DEMO_CONTROLS.md"
      - ".github/workflows/v12-final-demo-risk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest python-dotenv pandas numpy
      - name: Compile final-profile code
        run: python -m compileall -q mt5_ai_bridge tests research v12_final_preflight.py v12_final_runner.py
      - name: Run final-profile tests
        run: >-
          python -m pytest -q
          tests/test_v12_final_risk.py
          tests/test_v12_final_execution.py
          tests/test_v12_final_adapter.py
          tests/test_v12_runner_timezones.py
      - name: Verify final runner parity
        run: python research/v12_final_runner_parity_backtest.py
