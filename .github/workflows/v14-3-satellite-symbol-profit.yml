name: V14.3 satellite symbol profit backtest

on:
  pull_request:
    branches:
      - v14-3-drawdown-profit-balance
    paths:
      - "mt5_ai_bridge/v14_3_satellite_symbol_profile.py"
      - "research/v14_3_satellite_symbol_profit_backtest.py"
      - "research/v14_3_satellite_symbol_profit_backtest_v2.py"
      - "tests/test_v14_3_satellite_symbol_profile.py"
      - ".github/workflows/v14-3-satellite-symbol-profit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_3_satellite_symbol_profile.py
          research/v14_3_satellite_symbol_profit_backtest.py
          research/v14_3_satellite_symbol_profit_backtest_v2.py
          tests/test_v14_3_satellite_symbol_profile.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_v14_3_satellite_symbol_profile.py | tee satellite-tests.log
      - name: Run full-history and exact-ten-year replays
        run: |
          python research/v14_3_satellite_symbol_profit_backtest_v2.py \
            --v12-ledger research/v12_final_ledger_output/v12_final_trade_ledger.csv \
            --ict-source research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv \
            --out research/v14_3_satellite_symbol_profit_output \
            | tee satellite-backtest.log
      - name: Verify material profit improvement and drawdown control
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('research/v14_3_satellite_symbol_profit_output/all_results.json').read_text())
          for result in payload['results'].values():
              baseline = result['baseline']
              enhanced = result['enhanced']
              assert enhanced['net_profit'] >= baseline['net_profit'], (baseline, enhanced)
              assert enhanced['max_closed_drawdown_percent'] <= 9.90, enhanced
              assert enhanced['stress_drawdown_percent'] <= 9.90, enhanced
              assert set(result['mode_coverage']) == {'GBPUSD','EURUSD','GBPJPY','AUDUSD','USDJPY'}
              for symbol in ('EURUSD','AUDUSD','USDJPY'):
                  before = result['baseline_target_symbols'][symbol]['net']
                  after = result['enhanced_target_symbols'][symbol]['net']
                  assert after > before, (result['case'], symbol, before, after)
          ten = payload['results']['exact_10_year_window']
          targets = ten['enhanced_target_symbols']
          assert targets['EURUSD']['net'] >= 900.0, targets
          assert targets['AUDUSD']['net'] >= 1000.0, targets
          assert targets['USDJPY']['net'] >= 300.0, targets
          assert targets['combined_net'] >= 2500.0, targets
          print('Exact ten-year portfolio net:', ten['enhanced']['net_profit'])
          print('Exact ten-year drawdown:', ten['enhanced']['max_closed_drawdown_percent'])
          print('Exact ten-year target symbols:', targets)
          PY
      - name: Upload complete output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-3-satellite-symbol-profit
          path: |
            research/v14_3_satellite_symbol_profit_output/
            satellite-tests.log
            satellite-backtest.log
          if-no-files-found: error
          retention-days: 90
