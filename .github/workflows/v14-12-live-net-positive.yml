name: V14.12 live net-positive after-cost model

on:
  push:
    branches:
      - v14-12-live-net-positive-after-costs
    paths:
      - "mt5_ai_bridge/v14_5_cost_robust_profile.py"
      - "mt5_ai_bridge/v14_5_2_profit_filter_profile.py"
      - "mt5_ai_bridge/v14_12_net_positive_guard.py"
      - "mt5_ai_bridge/v14_12_live_execution.py"
      - "v14_4_satellite_bot.py"
      - "Start-V14-4-Satellite.bat"
      - "research/v14_12_live_net_positive_backtest.py"
      - "tests/test_v14_4_profit_guard.py"
      - "tests/test_v14_12_net_positive_guard.py"
      - "research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv"
      - ".github/workflows/v14-12-live-net-positive.yml"
  pull_request:
    branches:
      - v14-4-live-profit-guard
    paths:
      - "mt5_ai_bridge/v14_5_cost_robust_profile.py"
      - "mt5_ai_bridge/v14_5_2_profit_filter_profile.py"
      - "mt5_ai_bridge/v14_12_net_positive_guard.py"
      - "mt5_ai_bridge/v14_12_live_execution.py"
      - "v14_4_satellite_bot.py"
      - "Start-V14-4-Satellite.bat"
      - "research/v14_12_live_net_positive_backtest.py"
      - "tests/test_v14_4_profit_guard.py"
      - "tests/test_v14_12_net_positive_guard.py"
      - "research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv"
      - ".github/workflows/v14-12-live-net-positive.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-backtest-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile live model and replay
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_5_cost_robust_profile.py
          mt5_ai_bridge/v14_5_2_profit_filter_profile.py
          mt5_ai_bridge/v14_12_net_positive_guard.py
          mt5_ai_bridge/v14_12_live_execution.py
          v14_4_satellite_bot.py
          research/v14_12_live_net_positive_backtest.py
          tests/test_v14_12_net_positive_guard.py
      - name: Run live cost and reconciliation tests
        run: |
          set -o pipefail
          mkdir -p research/v14_12_live_net_positive_output
          python -m pytest -q \
            tests/test_v14_4_profit_guard.py \
            tests/test_v14_12_net_positive_guard.py 2>&1 \
            | tee research/v14_12_live_net_positive_output/pytest.log
      - name: Run V14.12 exact-ten-year retail-cost replay
        run: |
          set -o pipefail
          mkdir -p research/v14_12_live_net_positive_output
          python research/v14_12_live_net_positive_backtest.py 2>&1 \
            | tee research/v14_12_live_net_positive_output/backtest_stdout.log
      - name: Validate after-cost profitability and risk controls
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('research/v14_12_live_net_positive_output')
          payload = json.loads((root / 'v14_12_results.json').read_text())
          exact = payload['exact_ten_year']['v14_12_net_positive']
          static = payload['exact_ten_year']['v14_5_2_static']

          assert payload['research_only'] is True
          assert payload['live_entrypoint_changed'] is True
          assert payload['historically_profitable_after_retail_costs'] is True, exact
          assert payload['within_drawdown_limits'] is True, exact
          assert exact['net_profit'] > 0.0, exact
          assert exact['ending_balance'] > exact['starting_balance'], exact
          assert exact['profit_factor'] > 1.0, exact
          assert exact['max_closed_drawdown_percent'] <= 9.60, exact
          assert exact['stress_drawdown_percent'] <= 10.00, exact
          assert exact['trades'] > 0, exact
          assert exact['modeled_cost_dollars'] > 0.0, exact
          assert static['net_profit'] > 0.0, static
          assert static['profit_factor'] > 1.0, static
          assert exact['tier_counts'].get('PROBATION', 0) > 0, exact['tier_counts']
          assert exact['tier_counts'].get('FULL', 0) > 0, exact['tier_counts']

          for expected in (
              'BACKTEST_REPORT.md',
              'v14_12_results.json',
              'full_history_v14_5_2_static_closed_trades.json',
              'full_history_v14_12_net_positive_closed_trades.json',
              'exact_ten_year_v14_5_2_static_closed_trades.json',
              'exact_ten_year_v14_12_net_positive_closed_trades.json',
              'pytest.log',
              'backtest_stdout.log',
          ):
              assert (root / expected).exists(), expected

          print('static_v14_5_2', static)
          print('adaptive_v14_12', exact)
          PY
      - name: Upload V14.12 validation package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-12-live-net-positive-after-costs
          path: research/v14_12_live_net_positive_output/
          if-no-files-found: error
          retention-days: 90
