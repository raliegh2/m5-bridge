name: V14.5.4 selective ICT alpha

on:
  pull_request:
    branches:
      - v14-5-2-adaptive-profit
    paths:
      - "research/v14_5_4_selective_ict_alpha.py"
      - "mt5_ai_bridge/v14_5_4_selective_ict_profile.py"
      - "tests/test_v14_5_4_selective_ict_profile.py"
      - "mt5_ai_bridge/v14_3_all_symbol_ict.py"
      - "mt5_ai_bridge/v14_3_satellite_symbol_profile.py"
      - "mt5_ai_bridge/v14_5_2_profit_filter_profile.py"
      - "research/data_v14_6/**"
      - "research/v12_final_ledger_output/v12_final_trade_ledger.csv"
      - "research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv"
      - ".github/workflows/v14-5-4-selective-ict-alpha.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile research and profile
        run: >-
          python -m py_compile
          research/v14_5_4_selective_ict_alpha.py
          mt5_ai_bridge/v14_5_4_selective_ict_profile.py
          tests/test_v14_5_4_selective_ict_profile.py
      - name: Run focused profile tests
        run: python -m pytest -q tests/test_v14_5_4_selective_ict_profile.py
      - name: Run selective ICT research and exact-ten-year replay
        run: |
          set -o pipefail
          mkdir -p research/v14_5_4_selective_ict_output
          python research/v14_5_4_selective_ict_alpha.py 2>&1 \
            | tee research/v14_5_4_selective_ict_output/backtest_stdout.log
      - name: Validate controls and outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from mt5_ai_bridge.v14_5_4_selective_ict_profile import PROMOTED_WIDE_ICT_RISK

          root = Path('research/v14_5_4_selective_ict_output')
          payload = json.loads((root / 'v14_5_4_results.json').read_text())
          assert payload['starting_balance'] == 5000.0
          assert payload['promoted_candidate_count'] > 0
          assert payload['promoted_symbols'] == ['EURUSD', 'AUDUSD']
          assert PROMOTED_WIDE_ICT_RISK == {
              ('EURUSD', 'eu_ny_20'): 0.25,
              ('AUDUSD', 'au_london_relaxed'): 0.15,
          }
          assert set(payload['ict_evidence']) == {'EURUSD', 'AUDUSD', 'USDJPY'}
          assert payload['ict_evidence']['EURUSD']['promoted'] is True
          assert payload['ict_evidence']['AUDUSD']['promoted'] is True
          assert payload['ict_evidence']['USDJPY']['promoted'] is False

          results = payload['results']
          expected = {
              'zero_cost': 5186.64,
              'demo_cost': 4140.56,
              'retail_cost': 3505.36,
          }
          for cost, benchmark in expected.items():
              old = results[f'v14_5_2/{cost}']['summary']
              new = results[f'v14_5_4/{cost}']['summary']
              assert abs(old['net_profit'] - benchmark) <= 0.10, (cost, old)
              assert new['net_profit'] > old['net_profit'], (cost, old, new)
              assert new['profit_factor'] > old['profit_factor'], (cost, old, new)
              assert new['max_closed_drawdown_percent'] < 9.60, (cost, new)
              assert new['stress_drawdown_percent'] < 10.00, (cost, new)
              print(cost, {
                  'v14_5_2_net': old['net_profit'],
                  'v14_5_4_net': new['net_profit'],
                  'delta': round(new['net_profit'] - old['net_profit'], 2),
                  'v14_5_2_pf': old['profit_factor'],
                  'v14_5_4_pf': new['profit_factor'],
                  'v14_5_2_dd': old['max_closed_drawdown_percent'],
                  'v14_5_4_dd': new['max_closed_drawdown_percent'],
              })

          for expected_file in (
              'BACKTEST_REPORT.md',
              'comparison_summary.csv',
              'yearly_profit_equity.csv',
              'filtered_wide_ict_candidates.csv',
              'promoted_selective_ict_candidates.csv',
              'demo_profit_comparison.png',
              'demo_drawdown_comparison.png',
          ):
              assert (root / expected_file).exists(), expected_file
          PY
      - name: Upload complete research package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-5-4-selective-ict-alpha
          path: research/v14_5_4_selective_ict_output/
          if-no-files-found: error
          retention-days: 90
