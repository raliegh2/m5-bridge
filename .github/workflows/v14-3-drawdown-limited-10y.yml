name: V14.3 drawdown-limited ten-year backtest

on:
  pull_request:
    branches:
      - v14-3-five-symbol-ict-shadow
    paths:
      - "mt5_ai_bridge/v14_3_drawdown_governor.py"
      - "research/v14_3_drawdown_limited_backtest.py"
      - "tests/test_v14_3_drawdown_governor.py"
      - ".github/workflows/v14-3-drawdown-limited-10y.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_3_drawdown_governor.py
          research/v14_3_drawdown_limited_backtest.py
          tests/test_v14_3_drawdown_governor.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_v14_3_drawdown_governor.py | tee drawdown-governor-tests.log
      - name: Run full-history and exact-ten-year replays
        run: |
          python research/v14_3_drawdown_limited_backtest.py \
            --v12-ledger research/v12_final_ledger_output/v12_final_trade_ledger.csv \
            --ict-source research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv \
            --out research/v14_3_drawdown_limited_output \
            | tee drawdown-limited-backtest.log
      - name: Verify validation gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('research/v14_3_drawdown_limited_output/all_results.json').read_text())
          for result in payload['results'].values():
              current = result['current']
              improved = result['drawdown_limited']
              assert improved['max_closed_drawdown_percent'] < current['max_closed_drawdown_percent'], (current, improved)
              assert improved['stress_drawdown_percent'] < current['stress_drawdown_percent'], (current, improved)
              assert improved['net_profit'] >= current['net_profit'] * 0.95, (current, improved)
              assert improved['governor_interventions'] > 0
              assert set(result['mode_coverage']) == {'GBPUSD','EURUSD','GBPJPY','AUDUSD','USDJPY'}
          ten = payload['results']['exact_10_year_window']
          print('Current 10y net:', ten['current']['net_profit'])
          print('Improved 10y net:', ten['drawdown_limited']['net_profit'])
          print('Current 10y max DD:', ten['current']['max_closed_drawdown_percent'])
          print('Improved 10y max DD:', ten['drawdown_limited']['max_closed_drawdown_percent'])
          print('Current 10y stress DD:', ten['current']['stress_drawdown_percent'])
          print('Improved 10y stress DD:', ten['drawdown_limited']['stress_drawdown_percent'])
          PY
      - name: Upload complete output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-3-drawdown-limited-10y
          path: |
            research/v14_3_drawdown_limited_output/
            drawdown-governor-tests.log
            drawdown-limited-backtest.log
          if-no-files-found: error
          retention-days: 90
