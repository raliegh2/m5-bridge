name: V14.3 drawdown-limited ten-year backtest

on:
  pull_request:
    branches:
      - v14-3-five-symbol-ict-shadow
    paths:
      - "mt5_ai_bridge/v14_3_drawdown_governor.py"
      - "research/v14_3_drawdown_limited_backtest.py"
      - "tests/test_v14_3_drawdown_governor.py"
      - ".github/workflows/v14-3-drawdown-limited-backtest.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_3_drawdown_governor.py
          research/v14_3_drawdown_limited_backtest.py
          tests/test_v14_3_drawdown_governor.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_v14_3_drawdown_governor.py | tee drawdown-governor-tests.log
      - name: Run full-history and exact-ten-year replays
        run: |
          python research/v14_3_drawdown_limited_backtest.py \
            --v12-ledger research/v12_final_ledger_output/v12_final_trade_ledger.csv \
            --ict-source research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv \
            --out research/v14_3_drawdown_limited_output \
            | tee drawdown-limited-backtest.log
      - name: Verify profitability and drawdown gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path('research/v14_3_drawdown_limited_output/all_results.json').read_text()
          )
          results = payload['results']
          for result in results.values():
              current = result['current_five_symbol']
              improved = result['drawdown_limited']
              assert improved['net_profit'] >= current['net_profit'], (
                  result['case'], current['net_profit'], improved['net_profit']
              )
              assert improved['profit_factor'] >= current['profit_factor']
              assert improved['max_closed_drawdown_percent'] <= 8.75
              assert improved['stress_drawdown_percent'] <= 8.80
              assert improved['max_closed_drawdown_percent'] < current['max_closed_drawdown_percent']
              assert improved['stress_drawdown_percent'] < current['stress_drawdown_percent']
              assert improved['profile']['governor_trigger_count'] > 0
              assert improved['skip_reasons'].get('EQUITY_DRAWDOWN_PAUSE', 0) > 0
              for symbol, coverage in result['mode_coverage'].items():
                  assert coverage['v12_enabled'], (symbol, coverage)
                  assert coverage['ict_enabled'], (symbol, coverage)

          ten = results['exact_10_year_window']
          full = results['full_repository_history']
          assert ten['drawdown_limited']['net_profit'] >= 30000.0
          assert full['drawdown_limited']['net_profit'] >= 40000.0
          print('Exact 10-year current net:', ten['current_five_symbol']['net_profit'])
          print('Exact 10-year improved net:', ten['drawdown_limited']['net_profit'])
          print('Exact 10-year improved max DD:', ten['drawdown_limited']['max_closed_drawdown_percent'])
          print('Exact 10-year improved stress DD:', ten['drawdown_limited']['stress_drawdown_percent'])
          print('Full-history improved net:', full['drawdown_limited']['net_profit'])
          PY
      - name: Upload complete validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-3-drawdown-limited-10y
          path: |
            research/v14_3_drawdown_limited_output/
            drawdown-governor-tests.log
            drawdown-limited-backtest.log
          if-no-files-found: error
          retention-days: 90
