name: V14.7.2.1 exact-incumbent all-ten research

on:
  pull_request:
    branches:
      - v14-6-1-intraday-ict-trend
    paths:
      - "research/v14_7_2_1_all_ten_replay.py"
      - "research/v14_7_2_frozen_all_ten.py"
      - "mt5_ai_bridge/v14_6_1_intraday_ict_trend.py"
      - "mt5_ai_bridge/v14_7_strategy_families.py"
      - ".github/workflows/v14-7-2-1-all-ten.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  all-ten-research:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Restore V14.6 fixtures when absent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p research/v14_6_candidate_fixture
          if [ ! -s research/v14_6_candidate_fixture/all_swing_candidates.csv ] || \
             [ ! -s research/v14_6_candidate_fixture/all_wide_ict_candidates.csv ]; then
            curl --fail --location \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/raliegh2/m5-bridge/actions/artifacts/8391937431/zip \
              --output /tmp/v14_6_fixture.zip
            unzip -j /tmp/v14_6_fixture.zip \
              all_swing_candidates.csv all_wide_ict_candidates.csv \
              -d research/v14_6_candidate_fixture
          fi
          test -s research/v14_6_candidate_fixture/all_swing_candidates.csv
          test -s research/v14_6_candidate_fixture/all_wide_ict_candidates.csv
          test -s research/v14_6_2_raw_intraday_results.json
      - name: Compile implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_6_1_intraday_ict_trend.py
          mt5_ai_bridge/v14_7_strategy_families.py
          research/v14_7_2_frozen_all_ten.py
          research/v14_7_2_1_all_ten_replay.py
      - name: Run exact-incumbent all-ten replay
        id: backtest
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p research/v14_7_2_1_all_ten_output
          python research/v14_7_2_1_all_ten_replay.py 2>&1 \
            | tee research/v14_7_2_1_all_ten_output/backtest_stdout.log
      - name: Validate all-ten accounting
        id: validation
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('research/v14_7_2_1_all_ten_output')
          payload = json.loads((root / 'v14_7_2_results.json').read_text())
          expected = {'GBPUSD', 'EURUSD', 'GBPJPY', 'AUDUSD', 'USDJPY'}
          coverage = payload['coverage']
          assert set(coverage['active_swing_symbols']) == expected, coverage
          assert set(coverage['active_ict_symbols']) == expected, coverage
          assert coverage['all_ten_sleeves_active'] is True
          assert payload['method']['incumbent_sleeves_retained'] == 8
          assert payload['method']['new_five_block_sleeves'] == 2

          for symbol, mode in (('GBPUSD', 'ICT'), ('USDJPY', 'SWING')):
              evidence = payload['selections'][symbol][mode]['evidence']
              for block in ('train', 'validation', 'audit_a', 'audit_b', 'final_holdout'):
                  item = evidence[block]
                  assert item['trades'] > 0, (symbol, mode, block, item)
                  assert item['net_r'] > 0, (symbol, mode, block, item)
                  assert item['profit_factor'] > 1.01, (symbol, mode, block, item)

          best = payload['best_safe_portfolio']
          assert best['ending_balance'] > 0
          assert best['max_closed_drawdown_percent'] <= 9.60 + 1e-9, best
          assert best['stress_drawdown_percent'] <= 10.00 + 1e-9, best
          assert payload['target_reached'] == (best['net_profit'] >= 20000.0)
          assert payload['target_gap'] == round(max(0.0, 20000.0 - best['net_profit']), 2)
          print('coverage', coverage)
          print('best', best)
          print('improvement', payload['profit_improvement_vs_v14_6_2'])
          print('target_gap', payload['target_gap'])
          PY
      - name: Persist results and diagnostics
        if: always() && github.event_name == 'pull_request'
        run: |
          {
            echo "# V14.7.2.1 workflow status"
            echo
            echo "- Backtest outcome: ${{ steps.backtest.outcome }}"
            echo "- Validation outcome: ${{ steps.validation.outcome }}"
            echo "- Commit: ${{ github.sha }}"
            echo
            echo '```text'
            if [ -f research/v14_7_2_1_all_ten_output/backtest_stdout.log ]; then
              tail -n 180 research/v14_7_2_1_all_ten_output/backtest_stdout.log
            else
              echo "No V14.7.2.1 backtest log was produced."
            fi
            echo '```'
          } > research/V14_7_2_1_RUN_STATUS.md

          if [ -f research/v14_7_2_1_all_ten_output/BACKTEST_REPORT.md ]; then
            cp research/v14_7_2_1_all_ten_output/BACKTEST_REPORT.md research/V14_7_2_1_RESULTS.md
          fi
          if [ -f research/v14_7_2_1_all_ten_output/v14_7_2_results.json ]; then
            cp research/v14_7_2_1_all_ten_output/v14_7_2_results.json research/v14_7_2_1_results.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/V14_7_2_1_RUN_STATUS.md
          [ -f research/V14_7_2_1_RESULTS.md ] && git add research/V14_7_2_1_RESULTS.md
          [ -f research/v14_7_2_1_results.json ] && git add research/v14_7_2_1_results.json
          git commit -m "Record V14.7.2.1 exact-incumbent results" || exit 0
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload research package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-7-2-1-all-ten-20k
          path: research/v14_7_2_1_all_ten_output/
          if-no-files-found: warn
          retention-days: 90
      - name: Enforce successful research gate
        if: always()
        run: |
          if [ "${{ steps.backtest.outcome }}" != "success" ] || [ "${{ steps.validation.outcome }}" != "success" ]; then
            echo "V14.7.2.1 backtest or validation failed; diagnostics were persisted first."
            exit 1
          fi
