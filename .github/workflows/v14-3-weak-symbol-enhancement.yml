name: V14.3 weak-symbol enhancement backtest

on:
  pull_request:
    branches:
      - v14-3-profit-preserving-26k
    paths:
      - "mt5_ai_bridge/v12_weak_symbol_profile.py"
      - "research/v14_3_weak_symbol_enhancement_backtest.py"
      - "tests/test_v14_3_weak_symbol_enhancement.py"
      - ".github/workflows/v14-3-weak-symbol-enhancement.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas matplotlib pytest
      - name: Compile implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v12_weak_symbol_profile.py
          research/v14_3_weak_symbol_enhancement_backtest.py
          tests/test_v14_3_weak_symbol_enhancement.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_v14_3_weak_symbol_enhancement.py | tee weak-symbol-tests.log
      - name: Run full-history and exact-ten-year replays
        run: |
          python research/v14_3_weak_symbol_enhancement_backtest.py \
            --v12-ledger research/v12_final_ledger_output/v12_final_trade_ledger.csv \
            --ict-source research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv \
            --out research/v14_3_weak_symbol_enhancement_output \
            | tee weak-symbol-backtest.log
      - name: Verify profitability and safety gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          results = json.loads(Path('research/v14_3_weak_symbol_enhancement_output/all_results.json').read_text())
          ten = results['exact_10_year_window']
          full = results['full_repository_history']
          for result in (ten, full):
              assert result['enhanced']['net_profit'] >= result['current']['net_profit']
              assert result['enhanced']['max_closed_drawdown_percent'] < 10.0
              assert result['enhanced']['stress_drawdown_percent'] < 10.0
              assert set(result['diagnostics']) == {'GBPUSD','EURUSD','GBPJPY','AUDUSD','USDJPY'}
          for symbol in ('EURUSD','AUDUSD','USDJPY'):
              assert ten['target_symbols'][symbol]['enhanced_net'] > ten['target_symbols'][symbol]['current_net'], (symbol, ten['target_symbols'][symbol])
          assert ten['target_symbols']['USDJPY']['enhanced_net'] > 0.0
          assert ten['enhanced']['net_profit'] >= 26680.0
          assert full['enhanced']['net_profit'] >= 33049.0
          print('Exact 10-year enhanced profit:', ten['enhanced']['net_profit'])
          print('Full-history enhanced profit:', full['enhanced']['net_profit'])
          for symbol in ('EURUSD','AUDUSD','USDJPY'):
              print(symbol, ten['target_symbols'][symbol])
          PY
      - name: Upload complete output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-3-weak-symbol-enhancement
          path: |
            research/v14_3_weak_symbol_enhancement_output/
            weak-symbol-tests.log
            weak-symbol-backtest.log
          if-no-files-found: error
          retention-days: 90
