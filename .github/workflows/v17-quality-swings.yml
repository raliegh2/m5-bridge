name: V17 quality swing research

on:
  pull_request:
    branches:
      - v16-profit-preserving-loss-guard
    paths:
      - "research/v17_*.py"
      - "tests/test_v17_swing_risk_120.py"
      - ".github/workflows/v17-quality-swings.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy pytest
      - name: Compile research code
        run: python -m compileall -q research tests
      - name: Run swing-risk regression tests
        run: PYTHONPATH=research python -m pytest -q tests/test_v17_swing_risk_120.py
      - name: Run prior V17 baseline
        run: python research/v17_quality_swing_runner.py
      - name: Compare baseline with 20 percent higher swing risk
        run: python research/v17_swing_risk_120_runner.py 2>&1 | tee swing-risk-120.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v17-swing-risk-120-results
          path: |
            swing-risk-120.log
            research/v17_output/
            research/v17_risk120_output/
          if-no-files-found: error
          retention-days: 30
