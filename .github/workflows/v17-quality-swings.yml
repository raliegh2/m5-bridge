name: V17 quality swing research

on:
  pull_request:
    branches:
      - v16-profit-preserving-loss-guard
    paths:
      - "research/v17_*.py"
      - ".github/workflows/v17-quality-swings.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pandas numpy
      - run: python research/v17_quality_swing_runner.py
      - uses: actions/upload-artifact@v4
        with:
          name: v17-quality-swings
          path: research/v17_output/
          if-no-files-found: error
