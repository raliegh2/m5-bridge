name: V14.6.1 multi-entry intraday ICT trend

on:
  pull_request:
    branches:
      - v14-6-five-symbol-dual-engine
    paths:
      - "mt5_ai_bridge/v14_6_1_intraday_ict_trend.py"
      - "research/v14_6_1_intraday_ict_trend_backtest.py"
      - "tests/test_v14_6_1_intraday_ict_trend.py"
      - "research/v14_6_five_symbol_dual_engine_target.py"
      - "research/data_v14_6/**"
      - ".github/workflows/v14-6-1-intraday-ict-trend.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_6_1_intraday_ict_trend.py
          research/v14_6_1_intraday_ict_trend_backtest.py
          tests/test_v14_6_1_intraday_ict_trend.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_v14_6_1_intraday_ict_trend.py
      - name: Run intraday ICT validation and portfolio replay
        run: |
          set -o pipefail
          mkdir -p research/v14_6_1_intraday_ict_output
          python research/v14_6_1_intraday_ict_trend_backtest.py 2>&1 \
            | tee research/v14_6_1_intraday_ict_output/backtest_stdout.log
      - name: Validate costs, multi-entry behavior and accounting
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('research/v14_6_1_intraday_ict_output')
          payload = json.loads((root / 'v14_6_1_results.json').read_text())
          assert payload['retail_cost_r'] == {
              'SWING': 0.04,
              'ICT_WIDE': 0.09,
              'ICT_INTRADAY': 0.12,
              'ICT_LEGACY_M1': 0.16,
          }
          assert payload['execution_limits']['target_symbol_max_open_ict_positions'] == 2
          assert payload['execution_limits']['max_entries_per_hour'] == 1
          assert payload['execution_limits']['max_ict_open_risk_percent'] == 1.75
          assert payload['execution_limits']['max_combined_open_risk_percent'] == 3.25

          candidates = pd.read_csv(root / 'all_intraday_ict_candidates.csv')
          assert set(candidates['symbol']) == {'GBPUSD', 'GBPJPY', 'AUDUSD'}
          candidates['entry_time'] = pd.to_datetime(candidates['entry_time'], utc=True)
          candidates['day'] = candidates['entry_time'].dt.floor('D')
          daily = candidates.groupby(['symbol', 'day']).size()
          assert int(daily.max()) > 1, daily.describe()
          assert int(daily.max()) <= 7, daily.describe()
          for symbol in ('GBPUSD', 'GBPJPY', 'AUDUSD'):
              assert int((candidates['symbol'] == symbol).sum()) > 0
              assert payload['target_symbol_results'][symbol]['intraday_candidate_count'] > 0

          best = payload['best_safe_portfolio']
          assert best['ending_balance'] > 0
          assert best['max_closed_drawdown_percent'] <= 9.60 + 1e-9, best
          assert best['stress_drawdown_percent'] <= 10.00 + 1e-9, best
          assert payload['target_reached'] == (best['net_profit'] >= 34000.0)
          assert payload['target_gap'] == round(max(0.0, 34000.0 - best['net_profit']), 2)
          assert payload['profit_improvement_vs_v14_6'] == round(
              best['net_profit'] - payload['baseline_v14_6']['net_profit'], 2
          )

          for symbol, item in payload['target_symbol_results'].items():
              if item['validated']:
                  assert item['evidence'] is not None
                  for segment in ('development', 'confirmation', 'holdout'):
                      evidence = item['evidence']['segments'][segment]
                      assert evidence['trades'] > 0
                      assert evidence['net_r'] > 0
                      assert evidence['profit_factor'] > 1.0

          for expected in (
              'BACKTEST_REPORT.md',
              'all_intraday_ict_candidates.csv',
              'best_safe_trades.csv',
              'best_safe_skipped.csv',
              'best_safe_governor_events.csv',
              'portfolio_risk_search.csv',
          ):
              assert (root / expected).exists(), expected

          print('target_symbol_results', payload['target_symbol_results'])
          print('coverage', payload['coverage'])
          print('baseline', payload['baseline_v14_6'])
          print('best_safe', best)
          print('improvement', payload['profit_improvement_vs_v14_6'])
          print('target_gap', payload['target_gap'])
          PY
      - name: Persist compact research results
        if: github.event_name == 'pull_request'
        run: |
          cp research/v14_6_1_intraday_ict_output/BACKTEST_REPORT.md research/V14_6_1_INTRADAY_ICT_RESULTS.md
          cp research/v14_6_1_intraday_ict_output/v14_6_1_results.json research/v14_6_1_intraday_ict_results.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/V14_6_1_INTRADAY_ICT_RESULTS.md research/v14_6_1_intraday_ict_results.json
          git commit -m "Record V14.6.1 intraday ICT results" || exit 0
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload complete research package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-6-1-intraday-ict-trend
          path: research/v14_6_1_intraday_ict_output/
          if-no-files-found: error
          retention-days: 90
