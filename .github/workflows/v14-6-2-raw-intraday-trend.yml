name: V14.6.2 raw-candle multi-entry ICT trend

on:
  pull_request:
    branches:
      - v14-6-five-symbol-dual-engine
    paths:
      - "mt5_ai_bridge/v14_6_1_intraday_ict_trend.py"
      - "research/v14_6_1_intraday_ict_trend_backtest.py"
      - "research/v14_6_2_raw_intraday_trend_backtest.py"
      - "tests/test_v14_6_1_intraday_ict_trend.py"
      - ".github/workflows/v14-6-2-raw-intraday-trend.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  raw-candle-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Restore persisted V14.6 baseline fixtures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p research/v14_6_candidate_fixture
          if [ ! -s research/v14_6_candidate_fixture/all_swing_candidates.csv ] || \
             [ ! -s research/v14_6_candidate_fixture/all_wide_ict_candidates.csv ]; then
            curl --fail --location \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/raliegh2/m5-bridge/actions/artifacts/8391937431/zip \
              --output /tmp/v14_6_candidate_artifact.zip
            unzip -j /tmp/v14_6_candidate_artifact.zip \
              all_swing_candidates.csv all_wide_ict_candidates.csv \
              -d research/v14_6_candidate_fixture
          fi
          test -s research/v14_6_candidate_fixture/all_swing_candidates.csv
          test -s research/v14_6_candidate_fixture/all_wide_ict_candidates.csv
      - name: Compile raw trend implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_6_1_intraday_ict_trend.py
          research/v14_6_1_intraday_ict_trend_backtest.py
          research/v14_6_2_raw_intraday_trend_backtest.py
          tests/test_v14_6_1_intraday_ict_trend.py
      - name: Run focused partial-profit tests
        run: python -m pytest -q tests/test_v14_6_1_intraday_ict_trend.py
      - name: Run raw H1/H4/D1 multi-entry replay
        id: backtest
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p research/v14_6_2_raw_intraday_output
          python research/v14_6_2_raw_intraday_trend_backtest.py 2>&1 \
            | tee research/v14_6_2_raw_intraday_output/backtest_stdout.log
      - name: Validate raw-candle result
        id: validation
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('research/v14_6_2_raw_intraday_output')
          payload = json.loads((root / 'v14_6_1_results.json').read_text())
          assert payload['retail_cost_r'] == {
              'SWING': 0.04,
              'ICT_WIDE': 0.09,
              'ICT_INTRADAY': 0.12,
              'ICT_LEGACY_M1': 0.16,
          }
          limits = payload['execution_limits']
          assert limits['target_symbol_max_open_ict_positions'] == 2
          assert limits['max_entries_per_hour'] == 1
          assert limits['max_ict_open_risk_percent'] == 1.75
          assert limits['max_combined_open_risk_percent'] == 3.25

          candidates = pd.read_csv(root / 'all_intraday_ict_candidates.csv')
          candidates['entry_time'] = pd.to_datetime(candidates['entry_time'], utc=True)
          assert set(candidates['symbol']) == {'GBPUSD', 'GBPJPY', 'AUDUSD'}
          assert set(candidates['signal_mode']) == {'PULLBACK', 'BREAKOUT', 'RECLAIM'}
          assert bool((candidates['partial_fraction'] > 0).all())
          assert bool((candidates['partial_fraction'] < 1).all())
          daily = candidates.groupby([
              'symbol', candidates['entry_time'].dt.floor('D')
          ]).size()
          assert int(daily.max()) > 1, daily.describe()

          for symbol in ('GBPUSD', 'GBPJPY', 'AUDUSD'):
              item = payload['target_symbol_results'][symbol]
              assert item['intraday_candidate_count'] > 0
              if item['validated']:
                  assert item['selected_engine'].startswith(f'{symbol}_ICT_INTRADAY_')
                  assert item['activity']['maximum_entries_per_day'] > 1
                  for segment in ('development', 'confirmation', 'holdout'):
                      evidence = item['evidence']['segments'][segment]
                      assert evidence['trades'] > 0
                      assert evidence['net_r'] > 0
                      assert evidence['profit_factor'] > 1.0

          best = payload['best_safe_portfolio']
          assert best['ending_balance'] > 0
          assert best['max_closed_drawdown_percent'] <= 9.60 + 1e-9, best
          assert best['stress_drawdown_percent'] <= 10.00 + 1e-9, best
          assert payload['target_reached'] == (best['net_profit'] >= 34000.0)
          assert payload['target_gap'] == round(max(0.0, 34000.0 - best['net_profit']), 2)
          print('target_symbol_results', payload['target_symbol_results'])
          print('coverage', payload['coverage'])
          print('best_safe', best)
          print('improvement', payload['profit_improvement_vs_v14_6'])
          print('target_gap', payload['target_gap'])
          PY
      - name: Persist raw-candle results and diagnostics
        if: always() && github.event_name == 'pull_request'
        run: |
          {
            echo "# V14.6.2 raw-candle workflow status"
            echo
            echo "- Backtest outcome: ${{ steps.backtest.outcome }}"
            echo "- Validation outcome: ${{ steps.validation.outcome }}"
            echo "- Commit: ${{ github.sha }}"
            echo
            echo '```text'
            if [ -f research/v14_6_2_raw_intraday_output/backtest_stdout.log ]; then
              tail -n 140 research/v14_6_2_raw_intraday_output/backtest_stdout.log
            else
              echo "No raw-candle backtest log was produced."
            fi
            echo '```'
          } > research/V14_6_2_RAW_INTRADAY_STATUS.md

          if [ -f research/v14_6_2_raw_intraday_output/BACKTEST_REPORT.md ]; then
            cp research/v14_6_2_raw_intraday_output/BACKTEST_REPORT.md research/V14_6_2_RAW_INTRADAY_RESULTS.md
          fi
          if [ -f research/v14_6_2_raw_intraday_output/v14_6_1_results.json ]; then
            cp research/v14_6_2_raw_intraday_output/v14_6_1_results.json research/v14_6_2_raw_intraday_results.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/V14_6_2_RAW_INTRADAY_STATUS.md
          [ -f research/V14_6_2_RAW_INTRADAY_RESULTS.md ] && git add research/V14_6_2_RAW_INTRADAY_RESULTS.md
          [ -f research/v14_6_2_raw_intraday_results.json ] && git add research/v14_6_2_raw_intraday_results.json
          git commit -m "Record V14.6.2 raw intraday trend results" || exit 0
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload raw-candle research package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-6-2-raw-intraday-trend
          path: research/v14_6_2_raw_intraday_output/
          if-no-files-found: warn
          retention-days: 90
      - name: Enforce successful raw-candle gate
        if: always()
        run: |
          if [ "${{ steps.backtest.outcome }}" != "success" ] || [ "${{ steps.validation.outcome }}" != "success" ]; then
            echo "Raw-candle backtest or validation failed; diagnostics were persisted first."
            exit 1
          fi
