name: V15.2 adaptive diversified ten-year research

on:
  pull_request:
    branches:
      - v14-9-fxcm-walk-forward
    paths:
      - "research/download_fxcm_diversified_universe.py"
      - "mt5_ai_bridge/v15_diversified_strategies.py"
      - "mt5_ai_bridge/v15_1_currency_systems.py"
      - "research/v15_diversified_target_backtest.py"
      - "research/v15_2_adaptive_ensemble_entrypoint.py"
      - "research/v14_9_fxcm_walk_forward.py"
      - "research/v14_8_dukascopy_2016_2026_backtest.py"
      - ".github/workflows/v15-diversified-target.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  diversified-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
      FXCM_OUT: research/fxcm_diversified_2013_2026_data
      FXCM_FROM: "2013-01-01T00:00:00Z"
      FXCM_TO: "2026-05-31T23:59:59Z"
      FXCM_WORKERS: "32"
      FXCM_MIN_BARS: "18000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib requests pytest
      - name: Compile V15.2 research
        run: >-
          python -m py_compile
          research/download_fxcm_diversified_universe.py
          mt5_ai_bridge/v15_diversified_strategies.py
          mt5_ai_bridge/v15_1_currency_systems.py
          research/v15_diversified_target_backtest.py
          research/v15_2_adaptive_ensemble_entrypoint.py
      - name: Restore expanded FXCM cache
        id: fxcm-cache
        uses: actions/cache@v4
        with:
          path: research/fxcm_diversified_2013_2026_data
          key: fxcm-diversified-h1-2013-2026-v1
      - name: Download expanded FXCM bid-ask universe
        if: steps.fxcm-cache.outputs.cache-hit != 'true'
        run: python research/download_fxcm_diversified_universe.py
      - name: Validate expanded dataset
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('research/fxcm_diversified_2013_2026_data')
          manifest = json.loads((root / 'manifest.json').read_text())
          available = set(manifest['available'])
          core = {'GBPUSD', 'EURUSD', 'GBPJPY', 'AUDUSD', 'USDJPY'}
          assert core <= available, (core - available, manifest.get('unavailable'))
          assert len(available) >= 12, sorted(available)
          for symbol in available:
              for side in ('bid', 'ask'):
                  path = root / f'{symbol}_H1_{side}.csv'
                  assert path.exists(), path
                  frame = pd.read_csv(path, usecols=['time'])
                  assert len(frame) >= 18_000, (symbol, side, len(frame))
                  end = pd.to_datetime(frame['time'], utc=True).max()
                  assert end >= pd.Timestamp('2026-05-01T00:00:00Z'), (symbol, side, end)
          print('available_symbols', len(available), sorted(available))
          print('unavailable_symbols', manifest.get('unavailable', {}))
          PY
      - name: Run V15.2 adaptive ten-year replay
        run: |
          set -o pipefail
          rm -rf research/v15_2_adaptive_ensemble_output
          mkdir -p research/v15_2_adaptive_ensemble_output
          python research/v15_2_adaptive_ensemble_entrypoint.py 2>&1 \
            | tee research/v15_2_adaptive_ensemble_output/backtest_stdout.log
      - name: Validate safety, improvement and forward contribution
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('research/v15_2_adaptive_ensemble_output')
          payload = json.loads((root / 'v15_2_adaptive_ensemble_results.json').read_text())
          baseline = payload['baseline_v14_9']
          portfolio = payload['portfolio']
          new = payload['new_systems_full_period']
          forward = payload['forward_2024_2026']
          forward_new = payload['new_systems_2024_2026']

          assert payload['selection_protocol']['risk_multiplier_selected_before_forward_window'] is True
          assert payload['selection_protocol']['forward_profit_used_to_raise_risk'] is False
          assert payload['selection_protocol']['shadow_history_uses_only_prior_closed_trades'] is True
          assert portfolio['net_profit'] > baseline['net_profit'], (baseline, portfolio)
          assert portfolio['profit_factor'] > 1.0, portfolio
          assert portfolio['max_closed_drawdown_percent'] <= 9.60, portfolio
          assert portfolio['stress_drawdown_percent'] <= 10.00, portfolio
          assert new['trades'] > 0 and new['net_profit'] > 0.0, new
          assert forward['trades'] > 0 and forward['net_profit'] > 0.0, forward
          assert forward_new['trades'] > 0 and forward_new['net_profit'] > 0.0, forward_new
          assert payload['live_execution_changed'] is False
          assert payload['research_only'] is True

          for expected in (
              'BACKTEST_REPORT.md',
              'all_v15_2_candidates.csv',
              'v15_2_adaptive_gate.csv',
              'development_risk_grid.csv',
              'full_period_risk_grid.csv',
              'combined_gate_and_admission.csv',
              'admitted_candidates.csv',
              'baseline_v14_9_closed_trades.csv',
              'closed_trades.csv',
              'skipped_candidates.csv',
              'monthly_equity_profit_drawdown.csv',
              'annual_profit_fees_drawdown.csv',
              'monthly_equity_2016_2026.png',
              'annual_net_profit_2016_2026.png',
              'monthly_drawdown_2016_2026.png',
              'profit_by_symbol.png',
              'profit_by_mode.png',
              'cumulative_modeled_fees.png',
          ):
              assert (root / expected).exists(), expected

          print('baseline', baseline)
          print('portfolio', portfolio)
          print('new_systems', new)
          print('forward', forward)
          print('forward_new', forward_new)
          print('targets', {
              '20k': payload['target_20k_reached'],
              '20k_gap': payload['target_20k_gap'],
              '40k': payload['target_40k_reached'],
              '40k_gap': payload['target_40k_gap'],
          })
          PY
      - name: Upload V15.2 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v15-2-adaptive-ensemble-results
          path: research/v15_2_adaptive_ensemble_output/
          if-no-files-found: error
          retention-days: 90
      - name: Upload expanded data manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v15-fxcm-expanded-manifest
          path: research/fxcm_diversified_2013_2026_data/manifest.json
          if-no-files-found: warn
          retention-days: 30
