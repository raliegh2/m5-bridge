name: V14.3 production improvement backtest

on:
  pull_request:
    branches:
      - v13-v12-final-plus-v11-intraday
    paths:
      - "research/v14_3_production_improved_backtest.py"
      - "research/V14_3_PRODUCTION_IMPROVEMENTS.md"
      - "tests/test_v14_3_production_improved.py"
      - ".github/workflows/v14-3-production-improved.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas matplotlib pytest
      - name: Compile implementation
        run: python -m py_compile research/v14_3_production_improved_backtest.py tests/test_v14_3_production_improved.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_v14_3_production_improved.py | tee v14-3-production-tests.log
      - name: Run baseline and improved historical replays
        run: |
          python research/v14_3_production_improved_backtest.py \
            --v12-ledger research/v12_final_ledger_output/v12_final_trade_ledger.csv \
            --ict-source research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv \
            --out research/v14_3_production_improved_output \
            | tee v14-3-production-backtest.log
      - name: Verify baseline parity and five-symbol diagnostics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          current = json.loads(Path('research/v14_3_production_improved_output/all_results.json').read_text())
          reference = json.loads(Path('research/v14_3_true_combined_v12_ict_output/true_combined_summary.json').read_text())
          baseline = current['full_repository_history']['baseline']
          assert abs(baseline['net_profit'] - reference['net_profit']) < 0.02, (baseline['net_profit'], reference['net_profit'])
          assert baseline['closed_trades'] == reference['closed_trades'], (baseline['closed_trades'], reference['closed_trades'])
          diagnostics = current['full_repository_history']['diagnostics']
          assert set(diagnostics) == {'GBPUSD','EURUSD','GBPJPY','AUDUSD','USDJPY'}
          assert all(item['data_available'] for item in diagnostics.values())
          print('Baseline parity:', baseline['net_profit'])
          print('Improved profit:', current['full_repository_history']['improved']['net_profit'])
          print('Exact 10-year profit:', current['exact_10_year_window']['improved']['net_profit'])
          PY
      - name: Upload full backtest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-3-production-improved-backtest
          path: |
            research/v14_3_production_improved_output/
            v14-3-production-tests.log
            v14-3-production-backtest.log
          if-no-files-found: error
          retention-days: 90
