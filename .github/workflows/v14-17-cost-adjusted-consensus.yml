name: V14.17 cost-adjusted consensus

on:
  push:
    branches:
      - v14-17-cost-adjusted-consensus
    paths:
      - "mt5_ai_bridge/v14_17_cost_adjusted_consensus.py"
      - "mt5_ai_bridge/v14_17_cost_adjusted_consensus_live.py"
      - "research/v14_17_cost_adjusted_consensus_backtest.py"
      - "research/v14_17_cost_adjusted_consensus_backtest_run.py"
      - "tests/test_v14_17_cost_adjusted_consensus.py"
      - "V14_17_COST_ADJUSTED_CONSENSUS.md"
      - ".github/workflows/v14-17-cost-adjusted-consensus.yml"
  pull_request:
    branches:
      - v14-16-cost-efficient-quality-allocation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-backtest-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile V14.17 modules
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_17_cost_adjusted_consensus.py
          mt5_ai_bridge/v14_17_cost_adjusted_consensus_live.py
          research/v14_17_cost_adjusted_consensus_backtest.py
          research/v14_17_cost_adjusted_consensus_backtest_run.py
          tests/test_v14_17_cost_adjusted_consensus.py
      - name: Run inherited and V14.17 tests
        run: |
          set -o pipefail
          mkdir -p research/v14_17_cost_adjusted_consensus_output
          python -m pytest -q \
            tests/test_v14_4_profit_guard.py \
            tests/test_v14_13_cost_regime.py \
            tests/test_v14_14_extended_cost.py \
            tests/test_v14_15_unified_reasoning.py \
            tests/test_v14_16_quality_allocation.py \
            tests/test_v14_16_quality_nominal.py \
            tests/test_v14_16_quality_live.py \
            tests/test_v14_17_cost_adjusted_consensus.py 2>&1 \
            | tee research/v14_17_cost_adjusted_consensus_output/pytest.log
      - name: Run exact ten-year six-scenario chronological replay
        run: |
          set -o pipefail
          python research/v14_17_cost_adjusted_consensus_backtest_run.py 2>&1 \
            | tee research/v14_17_cost_adjusted_consensus_output/backtest_stdout.log
      - name: Validate V14.17 improvement and retained controls
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('research/v14_17_cost_adjusted_consensus_output')
          payload = json.loads((root / 'v14_17_results.json').read_text())
          results = payload['results']
          reference = payload['v14_16_reference_net']

          assert payload['model'] == 'V14.17_COST_ADJUSTED_CONSENSUS'
          assert payload['parent_model'] == 'V14.16_COST_EFFICIENT_QUALITY_ALLOCATION'
          assert payload['chronological_context_only'] is True
          assert payload['exit_research']['implemented'] is False

          zero = results['zero_cost/v14_13']['summary']
          assert abs(zero['net_profit'] - reference['zero_cost']) <= 0.02, zero
          assert zero['closed_trades'] == 4974, zero
          assert zero.get('v14_17_context_demotions', 0) == 0, zero
          assert zero.get('v14_17_correlation_caps', 0) == 0, zero
          assert zero['stress_drawdown_percent'] <= 10.00, zero

          for scenario in ('demo_cost', 'retail_cost', 'stress_cost', 'severe_cost', 'extreme_cost'):
              summary = results[f'{scenario}/v14_13']['summary']
              assert summary['net_profit'] > reference[scenario], (scenario, summary)
              assert summary['profit_factor'] > 1.0, (scenario, summary)
              assert summary['max_closed_drawdown_percent'] <= 9.60, (scenario, summary)
              assert summary['stress_drawdown_percent'] <= 10.00, (scenario, summary)
              assert summary.get('v14_17_context_demotions', 0) > 0, (scenario, summary)

              ledger = pd.read_csv(root / 'ledgers' / scenario / 'v14_13_trades.csv')
              assert ledger['risk_percent'].max() <= 0.80 + 1e-12, scenario
              assert ledger['executed_risk_percent'].max() <= 0.80 + 1e-12, scenario

              decisions = pd.read_csv(
                  root / 'ledgers' / scenario / 'v14_13_cost_regime_decisions.csv'
              )
              assert 'v14_17_action' in decisions.columns, scenario
              assert (decisions['v14_17_action'] == 'CONTEXT_DEMOTED').any() or (
                  decisions['v14_17_action'] == 'CONTEXT_AND_CORRELATION_DEMOTED'
              ).any(), scenario

          demo = results['demo_cost/v14_13']['summary']
          assert demo['net_profit'] > 13435.768959959689, demo

          extreme_coverage = payload['dual_mode_coverage']['extreme_cost']
          for symbol, modes in extreme_coverage.items():
              assert modes['V12'] > 0, (symbol, modes)
              assert modes['ICT'] > 0, (symbol, modes)

          for expected in (
              'V14_17_REPORT.md',
              'v14_17_results.json',
              'comparison_summary.csv',
              'pytest.log',
              'backtest_stdout.log',
              'ledgers/demo_cost/v14_13_trades.csv',
              'ledgers/extreme_cost/v14_13_trades.csv',
              'ledgers/demo_cost/v14_13_cost_regime_decisions.csv',
          ):
              assert (root / expected).exists(), expected

          print('zero', zero)
          for scenario in ('demo_cost', 'retail_cost', 'stress_cost', 'severe_cost', 'extreme_cost'):
              print(scenario, results[f'{scenario}/v14_13']['summary'])
          print('extreme_coverage', extreme_coverage)
          PY
      - name: Upload V14.17 validation package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-17-cost-adjusted-consensus
          path: research/v14_17_cost_adjusted_consensus_output/
          if-no-files-found: error
          retention-days: 90
