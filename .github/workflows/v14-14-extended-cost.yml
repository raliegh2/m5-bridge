name: V14.14 extended live cost regime

on:
  push:
    branches:
      - v14-14-extended-live-cost-regime
  pull_request:
    branches:
      - v14-13-cost-regime-research-parity
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-backtest-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Compile V14.14 live and research modules
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_14_extended_cost_profile.py
          mt5_ai_bridge/v14_14_extended_cost_execution.py
          research/v14_14_extended_cost_backtest.py
          tests/test_v14_14_extended_cost.py
          v14_4_satellite_bot.py
      - name: Run V14.4 V14.13 and V14.14 tests
        run: |
          set -o pipefail
          mkdir -p research/v14_14_extended_cost_output
          python -m pytest -q \
            tests/test_v14_4_profit_guard.py \
            tests/test_v14_13_cost_regime.py \
            tests/test_v14_14_extended_cost.py 2>&1 \
            | tee research/v14_14_extended_cost_output/pytest.log
      - name: Run exact ten-year extended cost replay
        run: |
          set -o pipefail
          python research/v14_14_extended_cost_backtest.py 2>&1 \
            | tee research/v14_14_extended_cost_output/backtest_stdout.log
      - name: Validate extended-cost profitability and evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('research/v14_14_extended_cost_output')
          payload = json.loads((root / 'v14_14_results.json').read_text())
          results = payload['results']

          zero_current = results['zero_cost/current_v14_3']['summary']
          zero_new = results['zero_cost/v14_13']['summary']
          assert abs(zero_current['net_profit'] - 34690.840749742056) <= 0.02
          assert abs(zero_new['net_profit'] - zero_current['net_profit']) <= 0.02
          assert zero_new['closed_trades'] == 4974

          for cost in ('demo_cost', 'retail_cost', 'stress_cost', 'severe_cost', 'extreme_cost'):
              current = results[f'{cost}/current_v14_3']['summary']
              improved = results[f'{cost}/v14_13']['summary']
              assert improved['net_profit'] > 0, (cost, improved)
              assert improved['net_profit'] > current['net_profit'], (cost, current, improved)
              assert improved['profit_factor'] > 1.0, (cost, improved)
              assert improved['max_closed_drawdown_percent'] <= 9.60, (cost, improved)
              assert improved['stress_drawdown_percent'] <= 10.00, (cost, improved)
              assert improved['modeled_cost_dollars'] > 0, (cost, improved)

          severe = results['severe_cost/v14_13']['summary']
          extreme = results['extreme_cost/v14_13']['summary']
          assert severe['net_profit'] >= 4000.0, severe
          assert extreme['net_profit'] >= 2500.0, extreme
          assert severe['profit_factor'] >= 1.30, severe
          assert extreme['profit_factor'] >= 1.20, extreme

          evidence = payload['strict_profile_evidence']
          for cost in ('severe_cost', 'extreme_cost'):
              for year in ('2023', '2024', '2025', '2026'):
                  block = evidence[cost][year]
                  assert block['trades'] >= 40, (cost, year, block)
                  assert block['net_r'] > 0, (cost, year, block)
                  assert block['profit_factor'] > 1.0, (cost, year, block)

          severe_decisions = pd.read_csv(
              root / 'ledgers' / 'severe_cost' / 'v14_13_cost_regime_decisions.csv'
          )
          extreme_decisions = pd.read_csv(
              root / 'ledgers' / 'extreme_cost' / 'v14_13_cost_regime_decisions.csv'
          )
          assert {'EXTENDED_COST_V12', 'EXTENDED_COST_SATELLITE', 'EXTREME_COST_GBP', 'SHADOW'} <= set(severe_decisions['regime'])
          assert {'EXTENDED_COST_V12', 'EXTREME_COST_GBP', 'SHADOW'} <= set(extreme_decisions['regime'])

          for expected in (
              'BACKTEST_REPORT.md',
              'v14_14_results.json',
              'comparison_summary.csv',
              'pytest.log',
              'backtest_stdout.log',
              'ledgers/severe_cost/v14_13_trades.csv',
              'ledgers/extreme_cost/v14_13_trades.csv',
          ):
              assert (root / expected).exists(), expected

          print('severe_cost', severe)
          print('extreme_cost', extreme)
          PY
      - name: Upload V14.14 validation package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-14-extended-live-cost-regime
          path: research/v14_14_extended_cost_output/
          if-no-files-found: error
          retention-days: 90
