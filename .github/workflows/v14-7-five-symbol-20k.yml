name: V14.7.1 five-symbol 20k research

on:
  pull_request:
    branches:
      - v14-6-1-intraday-ict-trend
    paths:
      - "mt5_ai_bridge/v14_7_strategy_families.py"
      - "research/v14_7_five_symbol_20k_backtest.py"
      - "research/v14_7_1_broad_walk_forward.py"
      - "tests/test_v14_7_strategy_families.py"
      - "research/v14_6_candidate_fixture/**"
      - ".github/workflows/v14-7-five-symbol-20k.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  walk-forward-research:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest
      - name: Restore V14.6 fixture when absent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p research/v14_6_candidate_fixture
          if [ ! -s research/v14_6_candidate_fixture/all_swing_candidates.csv ] || \
             [ ! -s research/v14_6_candidate_fixture/all_wide_ict_candidates.csv ]; then
            curl --fail --location \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/raliegh2/m5-bridge/actions/artifacts/8391937431/zip \
              --output /tmp/v14_6_fixture.zip
            unzip -j /tmp/v14_6_fixture.zip \
              all_swing_candidates.csv all_wide_ict_candidates.csv \
              -d research/v14_6_candidate_fixture
          fi
          test -s research/v14_6_candidate_fixture/all_swing_candidates.csv
          test -s research/v14_6_candidate_fixture/all_wide_ict_candidates.csv
      - name: Compile implementation
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_7_strategy_families.py
          research/v14_7_five_symbol_20k_backtest.py
          research/v14_7_1_broad_walk_forward.py
          tests/test_v14_7_strategy_families.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_v14_7_strategy_families.py
      - name: Run broadened five-symbol walk-forward replay
        id: backtest
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p research/v14_7_1_five_symbol_20k_output
          python research/v14_7_1_broad_walk_forward.py 2>&1 \
            | tee research/v14_7_1_five_symbol_20k_output/backtest_stdout.log
      - name: Validate research accounting
        id: validation
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('research/v14_7_1_five_symbol_20k_output')
          payload = json.loads((root / 'v14_7_results.json').read_text())
          assert payload['target'] == {
              'starting_balance': 5000.0,
              'net_profit': 20000.0,
              'ending_balance': 25000.0,
              'after_retail_costs_and_fees': True,
          }
          protocol = payload['validation_protocol']
          assert protocol['final_holdout_used_for_selection'] is False
          assert sum(protocol[key] for key in (
              'training_percent', 'validation_percent', 'audit_a_percent',
              'audit_b_percent', 'untouched_final_holdout_percent'
          )) == 100
          assert set(payload['selections']) == {'GBPUSD', 'EURUSD', 'GBPJPY', 'AUDUSD', 'USDJPY'}

          for symbol, modes in payload['selections'].items():
              for mode, selection in modes.items():
                  if selection is None:
                      continue
                  final = selection['evidence']['final_holdout']
                  assert final['trades'] > 0, (symbol, mode, final)
                  assert final['net_r'] > 0, (symbol, mode, final)
                  assert final['profit_factor'] > 1.02, (symbol, mode, final)
                  assert selection['base_risk_percent'] > 0

          best = payload['best_safe_portfolio']
          assert best['ending_balance'] > 0
          assert best['max_closed_drawdown_percent'] <= 9.60 + 1e-9, best
          assert best['stress_drawdown_percent'] <= 10.00 + 1e-9, best
          assert payload['target_reached'] == (best['net_profit'] >= 20000.0)
          assert payload['target_gap'] == round(max(0.0, 20000.0 - best['net_profit']), 2)

          for expected in (
              'BACKTEST_REPORT.md',
              'all_strategy_candidates.csv',
              'selected_swing_trades.csv',
              'selected_ict_trades.csv',
              'best_safe_trades.csv',
              'best_safe_skipped.csv',
              'portfolio_risk_search.csv',
          ):
              assert (root / expected).exists(), expected

          print('coverage', payload['coverage'])
          print('activity', payload['activity'])
          print('previous', payload['previous_v14_6_2'])
          print('best', best)
          print('improvement', payload['profit_improvement_vs_v14_6_2'])
          print('target_gap', payload['target_gap'])
          PY
      - name: Persist compact results and diagnostics
        if: always() && github.event_name == 'pull_request'
        run: |
          {
            echo "# V14.7.1 workflow status"
            echo
            echo "- Backtest outcome: ${{ steps.backtest.outcome }}"
            echo "- Validation outcome: ${{ steps.validation.outcome }}"
            echo "- Commit: ${{ github.sha }}"
            echo
            echo '```text'
            if [ -f research/v14_7_1_five_symbol_20k_output/backtest_stdout.log ]; then
              tail -n 180 research/v14_7_1_five_symbol_20k_output/backtest_stdout.log
            else
              echo "No V14.7.1 backtest log was produced."
            fi
            echo '```'
          } > research/V14_7_1_RUN_STATUS.md

          if [ -f research/v14_7_1_five_symbol_20k_output/BACKTEST_REPORT.md ]; then
            cp research/v14_7_1_five_symbol_20k_output/BACKTEST_REPORT.md research/V14_7_1_RESULTS.md
          fi
          if [ -f research/v14_7_1_five_symbol_20k_output/v14_7_results.json ]; then
            cp research/v14_7_1_five_symbol_20k_output/v14_7_results.json research/v14_7_1_results.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/V14_7_1_RUN_STATUS.md
          [ -f research/V14_7_1_RESULTS.md ] && git add research/V14_7_1_RESULTS.md
          [ -f research/v14_7_1_results.json ] && git add research/v14_7_1_results.json
          git commit -m "Record V14.7.1 broadened walk-forward results" || exit 0
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload complete research package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-7-1-five-symbol-20k
          path: research/v14_7_1_five_symbol_20k_output/
          if-no-files-found: warn
          retention-days: 90
      - name: Enforce successful research gate
        if: always()
        run: |
          if [ "${{ steps.backtest.outcome }}" != "success" ] || [ "${{ steps.validation.outcome }}" != "success" ]; then
            echo "V14.7.1 backtest or validation failed; diagnostics were persisted first."
            exit 1
          fi
