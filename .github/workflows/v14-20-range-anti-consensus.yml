name: V14.20 range anti-consensus integration

on:
  push:
    branches:
      - v14-20-range-anti-consensus-integration
    paths:
      - "mt5_ai_bridge/v14_20_range_anti_consensus.py"
      - "mt5_ai_bridge/v14_20_range_anti_consensus_live.py"
      - "research/v14_20_range_anti_consensus_backtest.py"
      - "research/v14_20_range_anti_consensus_backtest_run.py"
      - "tests/test_v14_20_range_anti_consensus.py"
      - "V14_20_RANGE_ANTI_CONSENSUS.md"
      - ".github/workflows/v14-20-range-anti-consensus.yml"
  pull_request:
    branches:
      - v14-19-range-mean-reversion-shadow
      - v14-20-range-anti-consensus-integration
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-download-backtest-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
      FXCM_OUT: research/fxcm_v14_19_range_2013_2026_data
      FXCM_FROM: "2013-01-01T00:00:00Z"
      FXCM_TO: "2026-05-31T23:59:59Z"
      FXCM_SYMBOLS: "GBPUSD,EURUSD,GBPJPY,AUDUSD,USDJPY"
      FXCM_WORKERS: "32"
      FXCM_MIN_BARS: "18000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib requests pytest
      - name: Compile V14.20 modules
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_20_range_anti_consensus.py
          mt5_ai_bridge/v14_20_range_anti_consensus_live.py
          research/v14_20_range_anti_consensus_backtest.py
          research/v14_20_range_anti_consensus_backtest_run.py
          tests/test_v14_20_range_anti_consensus.py
      - name: Run inherited and V14.20 tests
        run: |
          set -o pipefail
          mkdir -p research/v14_20_range_anti_consensus_output
          python -m pytest -q \
            tests/test_v14_4_profit_guard.py \
            tests/test_v14_13_cost_regime.py \
            tests/test_v14_14_extended_cost.py \
            tests/test_v14_15_unified_reasoning.py \
            tests/test_v14_16_quality_allocation.py \
            tests/test_v14_16_quality_nominal.py \
            tests/test_v14_16_quality_live.py \
            tests/test_v14_17_cost_adjusted_consensus.py \
            tests/test_v14_18_hierarchical_regime_meta.py \
            tests/test_v14_19_range_shadow.py \
            tests/test_v14_20_range_anti_consensus.py 2>&1 \
            | tee research/v14_20_range_anti_consensus_output/pytest.log
      - name: Restore FXCM core cache
        id: fxcm-cache
        uses: actions/cache@v4
        with:
          path: research/fxcm_v14_19_range_2013_2026_data
          key: fxcm-v14-19-range-core-h1-2013-2026-v1
      - name: Download official FXCM bid-ask data
        if: steps.fxcm-cache.outputs.cache-hit != 'true'
        run: python research/download_fxcm_v14_19_range_core.py
      - name: Validate FXCM dataset
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('research/fxcm_v14_19_range_2013_2026_data')
          manifest = json.loads((root / 'manifest.json').read_text())
          core = {'GBPUSD', 'EURUSD', 'GBPJPY', 'AUDUSD', 'USDJPY'}
          assert core <= set(manifest['available']), (core - set(manifest['available']))
          for symbol in sorted(core):
              for side in ('bid', 'ask'):
                  path = root / f'{symbol}_H1_{side}.csv'
                  frame = pd.read_csv(path, usecols=['time'])
                  times = pd.to_datetime(frame['time'], utc=True)
                  assert len(frame) >= 18_000, (symbol, side, len(frame))
                  assert times.min() <= pd.Timestamp('2016-01-04T00:00:00Z')
                  assert times.max() >= pd.Timestamp('2026-05-01T00:00:00Z')
          print('validated_core', sorted(core))
          PY
      - name: Run exact V14.20 six-scenario replay
        run: |
          set -o pipefail
          python research/v14_20_range_anti_consensus_backtest_run.py 2>&1 \
            | tee research/v14_20_range_anti_consensus_output/backtest_stdout.log
      - name: Validate improvement and retained controls
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('research/v14_20_range_anti_consensus_output')
          payload = json.loads((root / 'v14_20_results.json').read_text())
          results = payload['results']
          reference = payload['principal_reference_net']

          assert payload['model'] == 'V14.20_RANGE_ANTI_CONSENSUS_INTEGRATION'
          assert payload['parent_model'] == 'V14.19_RANGE_MEAN_REVERSION_SHADOW'
          assert payload['research_only'] is True
          assert payload['live_execution_changed'] is False
          assert payload['principal_portfolio_changed'] is True
          assert payload['risk_uplift_allowed'] is False
          assert payload['direct_range_risk_percent'] == 0.0

          zero = results['zero_cost/v14_13']['summary']
          assert abs(zero['net_profit'] - reference['zero_cost']) <= 0.02, zero
          assert zero.get('v14_20_shadow_actions', 0) == 0, zero
          assert zero['stress_drawdown_percent'] <= 10.00, zero

          for scenario in ('demo_cost', 'retail_cost', 'stress_cost', 'severe_cost', 'extreme_cost'):
              summary = results[f'{scenario}/v14_13']['summary']
              assert summary['net_profit'] > reference[scenario], (scenario, summary, reference[scenario])
              assert summary['profit_factor'] > 1.0, (scenario, summary)
              assert summary['max_closed_drawdown_percent'] <= 9.60, (scenario, summary)
              assert summary['stress_drawdown_percent'] <= 10.00, (scenario, summary)
              assert summary.get('v14_20_shadow_actions', 0) > 0, (scenario, summary)

              ledger = pd.read_csv(root / 'ledgers' / scenario / 'v14_13_trades.csv')
              assert ledger['risk_percent'].max() <= 0.80 + 1e-12, scenario
              assert ledger['executed_risk_percent'].max() <= 0.80 + 1e-12, scenario
              assert 'v14_20_range_relation' in ledger.columns, scenario

              decisions = pd.read_csv(
                  root / 'ledgers' / scenario / 'v14_13_cost_regime_decisions.csv'
              )
              shadow = decisions[decisions['v14_20_action'].astype(str) == 'SHADOW']
              assert not shadow.empty, scenario
              assert shadow['v14_20_range_relation'].eq('CONFLICT').all(), scenario
              assert (
                  pd.to_numeric(shadow['v14_20_engine_conflict_trades'], errors='coerce')
                  >= 10
              ).all(), scenario
              assert (
                  pd.to_numeric(shadow['v14_20_engine_conflict_mean_r'], errors='coerce')
                  < 0
              ).all(), scenario
              assert (
                  pd.to_numeric(
                      shadow['v14_20_engine_conflict_profit_factor'],
                      errors='coerce',
                  ) < 0.80
              ).all(), scenario
              assert (
                  pd.to_numeric(shadow['v14_20_parent_risk_percent'], errors='coerce')
                  > 0
              ).all(), scenario
              assert (
                  pd.to_numeric(shadow['v14_20_final_risk_percent'], errors='coerce')
                  == 0
              ).all(), scenario

          source = pd.read_csv(root / 'range_shadow_source_trades.csv')
          assert len(source) >= 100
          assert source['shadow_only'].astype(str).str.lower().eq('true').all()
          assert pd.to_numeric(
              source['requested_risk_percent'], errors='coerce'
          ).fillna(0).eq(0).all()
          assert pd.to_numeric(
              source['executed_risk_percent'], errors='coerce'
          ).fillna(0).eq(0).all()
          assert source['transmitted'].astype(str).str.lower().eq('false').all()

          extreme = payload['dual_mode_coverage']['extreme_cost']
          for symbol, modes in extreme.items():
              assert modes['V12'] > 0, (symbol, modes)
              assert modes['ICT'] > 0, (symbol, modes)

          for expected in (
              'V14_20_REPORT.md',
              'v14_20_results.json',
              'comparison_summary.csv',
              'pytest.log',
              'backtest_stdout.log',
              'range_shadow_source_trades.csv',
              'range_shadow_retail_cost_trades.csv',
              'ledgers/demo_cost/v14_13_trades.csv',
              'ledgers/extreme_cost/v14_13_trades.csv',
              'ledgers/retail_cost/v14_13_cost_regime_decisions.csv',
          ):
              assert (root / expected).exists(), expected

          print('zero', zero)
          for scenario in ('demo_cost', 'retail_cost', 'stress_cost', 'severe_cost', 'extreme_cost'):
              print(scenario, results[f'{scenario}/v14_13']['summary'])
          print('extreme_coverage', extreme)
          PY
      - name: Upload V14.20 validation package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-20-range-anti-consensus-integration
          path: research/v14_20_range_anti_consensus_output/
          if-no-files-found: error
          retention-days: 90
