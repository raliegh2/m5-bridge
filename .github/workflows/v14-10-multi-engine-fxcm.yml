name: V14.10 FXCM multi-engine external test

on:
  pull_request:
    branches:
      - v14-9-fxcm-walk-forward
    paths:
      - "mt5_ai_bridge/v14_10_alternative_engines.py"
      - "research/v14_10_multi_engine_fxcm_backtest.py"
      - "research/v14_10_multi_engine_entrypoint.py"
      - "research/v14_9_fxcm_walk_forward.py"
      - "research/v14_8_dukascopy_2016_2026_backtest.py"
      - "research/v14_8_strict_all_ten_20k.py"
      - ".github/workflows/v14-10-multi-engine-fxcm.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  multi-engine-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib pytest requests
      - name: Compile alternative engines and replay
        run: >-
          python -m py_compile
          mt5_ai_bridge/v14_10_alternative_engines.py
          research/v14_10_multi_engine_fxcm_backtest.py
          research/v14_10_multi_engine_entrypoint.py
      - name: Restore verified FXCM H1 bid-ask dataset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p research/fxcm_2016_2026_data
          curl --fail --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/raliegh2/m5-bridge/actions/artifacts/8394816921/zip \
            --output /tmp/fxcm_h1.zip
          unzip -o /tmp/fxcm_h1.zip -d research/fxcm_2016_2026_data
      - name: Validate source data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('research/fxcm_2016_2026_data')
          manifest = json.loads((root / 'manifest.json').read_text())
          assert set(manifest['symbols']) == {'GBPUSD', 'EURUSD', 'GBPJPY', 'AUDUSD', 'USDJPY'}
          for symbol in manifest['symbols']:
              for side in ('bid', 'ask'):
                  path = root / f'{symbol}_H1_{side}.csv'
                  frame = pd.read_csv(path, usecols=['time'])
                  times = pd.to_datetime(frame['time'], utc=True)
                  assert len(frame) > 50_000, (path, len(frame))
                  assert times.min() <= pd.Timestamp('2015-01-05', tz='UTC')
                  assert times.max() >= pd.Timestamp('2026-05-01 20:00', tz='UTC')
          PY
      - name: Run V14.10 multi-engine replay
        run: |
          set -o pipefail
          mkdir -p research/v14_10_multi_engine_fxcm_output
          python research/v14_10_multi_engine_entrypoint.py 2>&1 \
            | tee research/v14_10_multi_engine_fxcm_output/backtest_stdout.log
      - name: Validate genuine improvement and safety
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('research/v14_10_multi_engine_fxcm_output')
          payload = json.loads((root / 'v14_10_multi_engine_results.json').read_text())
          baseline = payload['baseline_v14_9']
          portfolio = payload['portfolio']
          fresh = payload['fresh_2022_2026']
          fresh_alt = payload['fresh_alternative_2022_2026']

          assert payload['provider'] == 'FXCM official weekly H1 candle archive'
          assert payload['selection_protocol']['holdout_not_used_for_selection'] is True
          assert len(payload['selected_alternative_sleeves']) > 0
          assert {'BREAKOUT', 'MOMENTUM', 'MEAN_REVERSION'} & {
              item['mode'] for item in payload['selected_alternative_sleeves']
          }
          assert portfolio['net_profit'] > baseline['net_profit'], (baseline, portfolio)
          assert portfolio['profit_factor'] > 1.0, portfolio
          assert portfolio['max_closed_drawdown_percent'] <= 9.60, portfolio
          assert portfolio['stress_drawdown_percent'] <= 10.00, portfolio
          assert fresh['net_profit'] > 0.0, fresh
          assert fresh_alt['net_profit'] > 0.0, fresh_alt
          assert set(payload['attribution_by_symbol']) == {
              'GBPUSD', 'EURUSD', 'GBPJPY', 'AUDUSD', 'USDJPY'
          }
          assert payload['target_reached'] == (portfolio['net_profit'] >= 20_000.0)
          assert payload['target_gap'] == round(max(0.0, 20_000.0 - portfolio['net_profit']), 2)

          for expected in (
              'BACKTEST_REPORT.md',
              'existing_swing_ict_candidates.csv',
              'all_alternative_candidates.csv',
              'selected_alternative_candidates.csv',
              'alternative_engine_evidence.csv',
              'multi_engine_gate_and_admission.csv',
              'closed_trades.csv',
              'monthly_equity_profit_drawdown.csv',
              'annual_profit_fees_drawdown.csv',
              'monthly_equity_2016_2026.png',
              'annual_net_profit_2016_2026.png',
              'monthly_drawdown_2016_2026.png',
              'profit_by_symbol.png',
              'profit_by_mode.png',
              'profit_by_engine_class.png',
              'alternative_profit_by_family.png',
              'cumulative_modeled_fees.png',
          ):
              assert (root / expected).exists(), expected

          print('baseline', baseline)
          print('v14_10', portfolio)
          print('improvement', payload['improvement'])
          print('fresh', fresh)
          print('fresh_alternative', fresh_alt)
          print('selected', payload['selected_alternative_sleeves'])
          print('attribution', payload['attribution_by_engine_class'])
          PY
      - name: Upload V14.10 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-10-fxcm-multi-engine-results
          path: research/v14_10_multi_engine_fxcm_output/
          if-no-files-found: error
          retention-days: 90
