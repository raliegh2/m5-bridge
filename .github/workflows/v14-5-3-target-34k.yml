name: V14.5.3 target $34k feasibility

on:
  pull_request:
    branches:
      - v14-5-2-adaptive-profit
    paths:
      - "research/v14_5_3_target_34k_research.py"
      - "research/v14_5_2_profit_filter_backtest.py"
      - "mt5_ai_bridge/v14_5_2_profit_filter_profile.py"
      - "research/v12_final_ledger_output/v12_final_trade_ledger.csv"
      - "research/v14_3_true_combined_v12_ict_output/true_combined_closed_trades.csv"
      - ".github/workflows/v14-5-3-target-34k.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  feasibility-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib
      - name: Compile research
        run: >-
          python -m py_compile
          research/v14_5_3_target_34k_research.py
      - name: Run target feasibility search
        run: |
          set -o pipefail
          mkdir -p research/v14_5_3_target_34k_output
          python research/v14_5_3_target_34k_research.py 2>&1 \
            | tee research/v14_5_3_target_34k_output/backtest_stdout.log
      - name: Validate outputs and target classification
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('research/v14_5_3_target_34k_output')
          payload = json.loads((root / 'target_34k_results.json').read_text())
          assert payload['target']['starting_balance'] == 5000.0
          assert payload['target']['net_profit'] == 34000.0
          assert payload['target']['ending_balance'] == 39000.0
          constraints = payload['preserved_constraints']
          assert constraints['current_promoted_risk_percent'] == 0.75
          assert constraints['current_parity_ceiling_percent'] == 0.80
          assert constraints['observation_risk_percent'] == 0.025
          assert constraints['max_closed_drawdown_percent'] == 9.60
          assert constraints['max_stress_drawdown_percent'] == 10.00
          assert constraints['same_v14_5_2_filters'] is True
          assert constraints['same_entries_stops_targets_exits'] is True
          assert constraints['same_ict_controls'] is True
          assert constraints['same_drawdown_governor'] is True

          for cost in ('zero_cost', 'demo_cost', 'retail_cost'):
              selected = payload['selected'][cost]
              current = selected['current']
              assert abs(current['promoted_risk_percent'] - 0.75) < 1e-9
              assert selected['best_within_current_parity_ceiling']['promoted_risk_percent'] <= 0.80 + 1e-9
              best_safe = selected['best_with_preserved_drawdown_boundary']
              if best_safe is not None:
                  summary = best_safe['summary']
                  assert summary['max_closed_drawdown_percent'] <= 9.60 + 1e-9
                  assert summary['stress_drawdown_percent'] <= 10.00 + 1e-9
              safe_target = selected['minimum_safe_risk_reaching_target']
              if safe_target is not None:
                  summary = safe_target['summary']
                  assert summary['net_profit'] >= 34000.0
                  assert summary['max_closed_drawdown_percent'] <= 9.60 + 1e-9
                  assert summary['stress_drawdown_percent'] <= 10.00 + 1e-9
              target = selected['minimum_risk_reaching_target']
              if target is not None:
                  assert target['summary']['net_profit'] >= 34000.0
              print(cost, {
                  'current': current['summary'],
                  'best_safe': None if best_safe is None else best_safe['summary'],
                  'target': None if target is None else target['summary'],
                  'safe_target': None if safe_target is None else safe_target['summary'],
              })

          for expected in (
              'TARGET_34K_REPORT.md',
              'target_34k_risk_search.csv',
              'zero_cost_risk_vs_profit.png',
              'zero_cost_risk_vs_drawdown.png',
              'demo_cost_risk_vs_profit.png',
              'demo_cost_risk_vs_drawdown.png',
              'retail_cost_risk_vs_profit.png',
              'retail_cost_risk_vs_drawdown.png',
          ):
              assert (root / expected).exists(), expected
          PY
      - name: Upload complete feasibility package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-5-3-target-34k-feasibility
          path: research/v14_5_3_target_34k_output/
          if-no-files-found: error
          retention-days: 90
