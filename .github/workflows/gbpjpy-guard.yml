name: Final five-symbol validation

on:
  pull_request:
    branches:
      - v13-v12-final-plus-v11-intraday
      - fix-gbpjpy-loss-guard
    paths:
      - "GBPJPY_GUARD_IMPLEMENTATION.md"
      - "final_five_symbol_runner.py"
      - "mt5_ai_bridge/**"
      - "research/build_v14_3_selected_ict_ledger.py"
      - "research/final_five_symbol_10y_backtest.py"
      - "research/v14_7_gbpjpy_guarded_combined_replay.py"
      - "tests/**"
      - ".github/workflows/gbpjpy-guard.yml"
      - "research/combined_backtest_trigger.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest python-dotenv pandas numpy yfinance
      - name: Compile final bot code
        run: python -m compileall -q final_five_symbol_runner.py mt5_ai_bridge research/build_v14_3_selected_ict_ledger.py research/final_five_symbol_10y_backtest.py research/v14_7_gbpjpy_guarded_combined_replay.py
      - name: Run focused final-bot tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q tests/test_final_engine_registry.py tests/test_symbol_diagnostics.py tests/test_gbpjpy_guard.py tests/test_gbpjpy_guarded_execution.py tests/test_v13_v12_plus_v11_intraday_profile.py tests/test_v14_7_gbpjpy_guarded_replay.py tests/test_v12_final_execution.py tests/test_v12_final_adapter.py | tee pytest-output.txt
      - name: Run V12-only repository-history replay
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python research/final_five_symbol_10y_backtest.py 2>&1 | tee v12-baseline.log
      - name: Rebuild selected ICT ledger
        if: always()
        shell: bash
        run: |
          set -o pipefail
          python research/build_v14_3_selected_ict_ledger.py 2>&1 | tee ict-ledger-build.log
      - name: Run chronological V12 plus ICT combined replay
        if: always()
        shell: bash
        run: |
          set -o pipefail
          python research/v14_7_gbpjpy_guarded_combined_replay.py 2>&1 | tee combined-v14-7.log
      - name: Upload final validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-five-symbol-combined-validation
          path: |
            pytest-output.txt
            v12-baseline.log
            ict-ledger-build.log
            combined-v14-7.log
            research/final_five_symbol_10y_output/
            research/v12_plus_validated_assets_output/
            research/v14_3_under10_target_out/selected_under10_target_trades.csv
            research/v14_7_gbpjpy_guarded_combined_out/
          if-no-files-found: warn
          retention-days: 90
