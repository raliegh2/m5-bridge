name: Final five-symbol validation

on:
  pull_request:
    branches:
      - v13-v12-final-plus-v11-intraday
    paths:
      - "GBPJPY_GUARD_IMPLEMENTATION.md"
      - "final_five_symbol_runner.py"
      - "mt5_ai_bridge/final_engine_registry.py"
      - "mt5_ai_bridge/symbol_diagnostics.py"
      - "mt5_ai_bridge/mt5_client.py"
      - "mt5_ai_bridge/gbpjpy_guard.py"
      - "mt5_ai_bridge/gbpjpy_guarded_execution.py"
      - "mt5_ai_bridge/gbpjpy_strict_execution.py"
      - "mt5_ai_bridge/v12_final_adapter.py"
      - "mt5_ai_bridge/v13_v12_plus_v11_intraday_profile.py"
      - "research/final_five_symbol_10y_backtest.py"
      - "research/v14_7_gbpjpy_guarded_combined_replay.py"
      - "tests/test_final_engine_registry.py"
      - "tests/test_symbol_diagnostics.py"
      - "tests/test_gbpjpy_guard.py"
      - "tests/test_gbpjpy_guarded_execution.py"
      - "tests/test_v13_v12_plus_v11_intraday_profile.py"
      - "tests/test_v14_7_gbpjpy_guarded_replay.py"
      - ".github/workflows/gbpjpy-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest python-dotenv pandas numpy yfinance
      - name: Compile final bot code
        run: >-
          python -m compileall -q
          final_five_symbol_runner.py
          mt5_ai_bridge/final_engine_registry.py
          mt5_ai_bridge/symbol_diagnostics.py
          mt5_ai_bridge/mt5_client.py
          mt5_ai_bridge/gbpjpy_guard.py
          mt5_ai_bridge/gbpjpy_guarded_execution.py
          mt5_ai_bridge/gbpjpy_strict_execution.py
          mt5_ai_bridge/v12_final_adapter.py
          mt5_ai_bridge/v13_v12_plus_v11_intraday_profile.py
          research/final_five_symbol_10y_backtest.py
          research/v14_7_gbpjpy_guarded_combined_replay.py
      - name: Run focused final-bot tests
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q \
            tests/test_final_engine_registry.py \
            tests/test_symbol_diagnostics.py \
            tests/test_gbpjpy_guard.py \
            tests/test_gbpjpy_guarded_execution.py \
            tests/test_v13_v12_plus_v11_intraday_profile.py \
            tests/test_v14_7_gbpjpy_guarded_replay.py \
            tests/test_v12_final_execution.py \
            tests/test_v12_final_adapter.py \
            > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          exit $status
      - name: Run repository-history final five-symbol replay
        run: python research/final_five_symbol_10y_backtest.py
      - name: Upload final validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-five-symbol-10y-validation
          path: |
            pytest-output.txt
            research/final_five_symbol_10y_output/
            research/v12_plus_validated_assets_output/
          if-no-files-found: warn
          retention-days: 90
